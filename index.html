<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Incredible India</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: #ff6b00;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #333;
      padding: 12px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 15px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
    }

    nav a:hover {
      color: #ff6b00;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: white;
      width: 260px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .card h3 {
      margin: 10px;
      color: #333;
    }

    .card p {
      margin: 8px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

<header>
  <h1> Incredible India</h1>
  <p>Explore the beauty of India</p>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="tourism.html">Tourism</a>
  <a href="states.html">States</a>
  <a href="temples.html">Temples</a>
  <a href="explore.html">Explore</a>
</nav>

<div class="container">
  <h2>Top Places in India</h2>

  <div class="cards" id="places-container"></div>
</div>

<script>
fetch("./places.json")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("places-container");

    data.forEach(place => {
      const card = document.createElement("div");
      card.classList.add("place-card");

      card.innerHTML = `
        <img src="${place.image}" alt="${place.name}">
        <h3>${place.name}</h3>
        <p>${place.state}</p>
        <p>${place.info}</p>
      `;

      container.appendChild(card);
    });
  })
  .catch(err => console.error(err));
</script>
</body>
</html>
